<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erro 404</title>
    <style>
        
        body {
            background-color: #f0f2f5; 
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; 
            margin: 0;
            color: #333;
        }

        
        h2 {
            font-size: 2.5rem;
            color: #e74c3c; 
            margin-bottom: 10px;
        }

        h3 {
            font-size: 1.2rem;
            font-weight: normal;
            color: #777;
            margin-bottom: 25px;
        }

        
        .botao-voltar {
            text-decoration: none;
            color: white;
            background-color: #3498db; 
            padding: 10px 20px;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .botao-voltar:hover {
            background-color: #2980b9; 
        }
    </style>
</head>
<body>

    <h2>Erro, página não encontrada!</h2>
    <h3>Tente novamente mais tarde.</h3>
    
    <a href="/" class="botao-voltar">Voltar para a página inicial</a>

</body>
</html>
