<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - Alerta de Calor</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            color: #d35400;
        }
        .card-verao {
            background: rgba(255, 255, 255, 0.9);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 400px;
        }
        h2 { font-size: 2rem; margin-top: 0; }
        .emoji-sol { font-size: 4rem; margin: 10px 0; }
        p { line-height: 1.6; color: #555; }
        .aviso {
            font-weight: bold;
            color: #c0392b;
            text-transform: uppercase;
        }
        .btn-home {
            margin-top: 20px;
            display: inline-block;
            background: #e67e22;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 25px;
            transition: 0.3s;
        }
        .btn-home:hover { background: #d35400; }
    </style>
</head>
<body>
    <div class="card-verao">
        <div class="emoji-sol">☀️</div>
        <h2>Aviso de Verão</h2>
        <p class="aviso">O Verão está bem quente!</p>
        <p>Não esqueça de beber muita água e usar protetor solar. </p>
        <a href="/home" class="btn-home">Voltar ao início</a>
    </div>
</body>
</html>
